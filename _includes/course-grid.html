<!-- Course history grid. Data: _data/courses.yml. Styles: assets/css/about.css. -->
<div class="course-table-wrap">
<table class="course-table">
<thead><tr>
{%- for sem in site.data.courses -%}
<th class="semester-header">{{ sem.term }}</th>
{%- endfor -%}
</tr></thead>
<tbody><tr>
{%- for sem in site.data.courses -%}
<td>
{%- for c in sem.courses -%}
<div class="{{ c.class }} tooltip-container" tabindex="0" aria-label="{{ c.code }} — {{ c.name }}">
<span class="course-code">{{ c.code }}</span>
<span class="tooltip-content"><strong>{{ c.name }}</strong></span>
</div>
{%- endfor -%}
</td>
{%- endfor -%}
</tr></tbody>
</table>
</div>

<div class="legend">
<div class="legend-item legend-cs">Computer Science</div>
<div class="legend-item legend-mas">Mathematics</div>
<div class="legend-item legend-science">Science</div>
<div class="legend-item legend-breadth">Humanities</div>
</div>
